services:
  api:
    image: ghcr.io/orquestio/orchestrator:v0.2.0
    container_name: orquestio-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orquestio-net

  db:
    image: postgres:16-alpine
    container_name: orquestio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orquestio}
      POSTGRES_USER: ${POSTGRES_USER:-orquestio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Postgres ejecuta /docker-entrypoint-initdb.d/ en orden lexicográfico
      # SOLO en la primera inicialización del volume. Ver
      # README.md → "Migrations de schema existente" para el patrón manual
      # post-bootstrap.
      - ./sql-bootstrap/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orquestio}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - orquestio-net

  redis:
    image: redis:7-alpine
    container_name: orquestio-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - orquestio-net

  nginx:
    image: nginx:alpine
    container_name: orquestio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - orquestio-net

volumes:
  pgdata:

networks:
  orquestio-net:
    driver: bridge
