events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    # Cloudflare IP ranges — only allow traffic from Cloudflare
    # IMPORTANT: use $realip_remote_addr (TCP-layer IP before real_ip module rewrites it).
    # If we used $remote_addr (the default), it would already be the client IP from
    # CF-Connecting-IP, so the check would always fail and block legitimate Cloudflare traffic.
    geo $realip_remote_addr $is_cloudflare {
        default 0;
        173.245.48.0/20 1;
        103.21.244.0/22 1;
        103.22.200.0/22 1;
        103.31.4.0/22 1;
        141.101.64.0/18 1;
        108.162.192.0/18 1;
        190.93.240.0/20 1;
        188.114.96.0/20 1;
        197.234.240.0/22 1;
        198.41.128.0/17 1;
        162.158.0.0/15 1;
        104.16.0.0/13 1;
        104.24.0.0/14 1;
        172.64.0.0/13 1;
        131.0.72.0/22 1;
        # Docker internal (for health checks)
        172.16.0.0/12 1;
        127.0.0.1/32 1;
    }

    server {
        listen 80;
        server_name api.orquestio.com;

        # Cloudflare proxy sends real IP in these headers
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 131.0.72.0/22;
        real_ip_header CF-Connecting-IP;

        # Block direct access (not through Cloudflare)
        if ($is_cloudflare = 0) {
            return 403;
        }

        # Redirect HTTP to HTTPS (when client accessed via HTTP through Cloudflare)
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }
}
